<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DBR Logger</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <script>
      (function () {
        const KEY = "dbr-theme";
        try {
          const storedTheme = window.localStorage.getItem(KEY);
          if (storedTheme === "dark") {
            document.documentElement.dataset.theme = "dark";
          }
        } catch {
          // ignore
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700;800&family=Noto+Sans+JP:wght@400;700;800&display=swap" rel="stylesheet" />
    <link id="app-stylesheet" rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero panel panel-hero">
        <div>
          <p class="eyebrow">DBR Logger</p>
          <h1>DBR進捗管理</h1>
          <p class="hero-manual-link">
            <a href="./manual.html" target="_blank" rel="noopener noreferrer">マニュアル</a>
            <span aria-hidden="true"> / </span>
            <a href="https://dbr-difficulty.github.io/dbr_ir_upload.html" target="_blank" rel="noopener noreferrer">DBR IR</a>
            <span aria-hidden="true"> / </span>
            <button id="clear-all-button" class="hero-inline-link" type="button">データ全削除</button>
          </p>
        </div>
        <div class="hero-actions">
          <button id="theme-toggle-button" class="button button-tertiary theme-toggle-button" type="button" aria-label="ダークテーマに切り替え" aria-pressed="false" title="ダークテーマに切り替え">
            <span class="theme-toggle-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                <path
                  d="M21 12.8A8.9 8.9 0 1 1 11.2 3a7.2 7.2 0 0 0 9.8 9.8Z"
                  fill="none"
                  stroke="currentColor"
                  stroke-linejoin="round"
                  stroke-width="1.8"
                ></path>
              </svg>
            </span>
          </button>
          <button id="csv-import-button" class="button button-secondary" type="button">CSV読み込み</button>
          <button id="csv-export-button" class="button button-secondary" type="button">CSV書き出し</button>
          <button id="import-button" class="button button-secondary" type="button">JSON読み込み</button>
          <button id="export-button" class="button button-secondary" type="button">JSON書き出し</button>
          <button id="send-json-to-ir-test" class="button button-secondary" type="button">DBR IR送信</button>
          <button id="difficulty-import-button" class="button button-secondary" type="button">難易度表読み込み</button>
          <input id="csv-import-file-input" type="file" accept="text/csv,.csv" hidden />
          <input id="import-file-input" type="file" accept="application/json,.json" hidden />
        </div>
      </header>
      <main class="layout">
        <section class="panel">
          <div class="panel-header">
            <div class="section-heading-group">
              <div class="section-toggle-row">
                <p class="eyebrow">Overview</p>
              </div>
              <h2>全体サマリー</h2>
            </div>
          </div>
          <div id="summary-content" class="summary-content">
            <div id="summary-cards" class="summary-grid"></div>
            <button id="summary-filters-toggle" class="summary-filters-toggle" type="button" aria-expanded="false">
              <span class="summary-filters-toggle-icon" aria-hidden="true">
                <svg viewBox="0 0 20 20" focusable="false" aria-hidden="true">
                  <path d="M7.25 4.75L13.25 10L7.25 15.25" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"></path>
                </svg>
              </span>
              <span class="summary-filters-toggle-label">フィルタを表示</span>
            </button>
            <div id="summary-filters-panel" class="filters-panel"></div>
          </div>
        </section>

        <section class="layout-two-column">
          <section class="panel">
            <div class="panel-header catalog-header">
              <div>
                <p class="eyebrow">Catalog</p>
                <h2>曲一覧</h2>
              </div>
              <label class="header-select">
                <span>並び順</span>
                <select id="catalog-sort-select">
                  <option value="title">曲名</option>
                  <option value="level">Lv.</option>
                  <option value="splv">SPLv.</option>
                  <option value="katate">片手Lv.</option>
                  <option value="clear">クリアランプ</option>
                  <option value="bestBp">最小BP</option>
                  <option value="latestBp">最新BP</option>
                  <option value="latest">最終プレー</option>
                  <option value="entryCount">プレー回数</option>
                  <option value="recommend">おすすめ</option>
                  <option value="memo">メモ</option>
                </select>
              </label>
              <button id="catalog-view-toggle" class="catalog-view-toggle" type="button" aria-label="曲一覧の表示形式を切り替え"></button>
            </div>
            <div id="catalog-meta" class="catalog-meta"></div>
            <div id="catalog-pagination-top" class="pagination-bar"></div>
            <div id="song-catalog" class="song-grid" aria-live="polite"></div>
            <div id="catalog-pagination-bottom" class="pagination-bar"></div>
          </section>

          <section class="stack">
            <section id="entry-panel" class="panel">
              <div class="panel-header">
                <div>
                  <p class="eyebrow">Entry</p>
                  <h2>プレー記録</h2>
                </div>
              </div>
              <div id="selected-song" class="selected-song-card"></div>

              <form id="record-form" class="record-form">
                <div class="form-row">
                  <div class="field">
                    <span>保存日</span>
                    <input id="record-date" type="text" disabled aria-label="保存日" />
                  </div>
                  <div class="field">
                    <span>クリア</span>
                    <div class="field-select entry-select-wrap">
                      <select id="lamp-input" aria-label="クリア"></select>
                    </div>
                  </div>
                </div>
                <div class="form-row entry-score-row">
                  <div class="field">
                    <span>スコア</span>
                    <input id="score-input" type="number" min="0" inputmode="numeric" aria-label="スコア" />
                  </div>
                  <div class="field entry-bp-field" data-bp-input-panel="bp">
                    <div class="field-title-row">
                      <span>BP</span>
                      <button class="entry-input-mode-link" type="button" data-bp-input-mode="split">BAD/POOR入力</button>
                    </div>
                    <input id="bp-input" type="number" min="0" inputmode="numeric" aria-label="BP" />
                  </div>
                  <div class="field entry-bp-field" data-bp-input-panel="split" hidden>
                    <div class="field-title-row">
                      <span>BAD / POOR</span>
                      <button class="entry-input-mode-link" type="button" data-bp-input-mode="bp">BP入力</button>
                    </div>
                    <div class="entry-bp-split-inputs">
                      <input id="bad-input" type="number" min="0" inputmode="numeric" aria-label="BAD" placeholder="BAD" />
                      <input id="poor-input" type="number" min="0" inputmode="numeric" aria-label="POOR" placeholder="POOR" />
                    </div>
                  </div>
                </div>
                <div class="field field-grow">
                  <span>メモ</span>
                  <input id="memo-input" type="text" maxlength="200" placeholder="メモを入力" aria-label="メモ" />
                </div>
                <div class="form-actions">
                  <div class="action-group">
                    <button class="button button-primary" type="submit">保存する</button>
                    <button id="back-to-card-button" class="button button-tertiary" type="button">戻る</button>
                  </div>
                </div>
              </form>
            </section>

            <section class="panel analytics-panel">
              <div class="panel-header">
                <div>
                  <p class="eyebrow">Analytics</p>
                  <h2>推移グラフ</h2>
                </div>
              </div>
              <section class="analytics-block">
                <div>
                  <h3>BP推移</h3>
                </div>
                <div id="chart-container" class="chart-container"></div>
              </section>
              <section class="analytics-block">
                <div>
                  <h3>スコア推移</h3>
                </div>
                <div id="score-chart-container" class="chart-container"></div>
              </section>
            </section>

            <section class="panel panel-history">
              <div class="panel-header">
                <div>
                  <p class="eyebrow">History</p>
                  <h2>選択曲の履歴</h2>
                </div>
              </div>
              <div class="table-wrap">
                <table class="history-table">
                  <thead>
                    <tr>
                      <th>日付</th>
                      <th>クリア</th>
                      <th>BP</th>
                      <th>スコア</th>
                      <th></th>  <!-- 削除列の空ヘッダー -->
                    </tr>
                  </thead>
                  <tbody id="history-body"></tbody>
                </table>
              </div>
            </section>

          </section>
        </section>
      </main>
    </div>
    <div id="floating-axis-filter" class="floating-axis-filter"></div>

    <script type="module">
      async function resolveBuildVersion() {
        try {
          const response = await fetch(`./version.json?ts=${Date.now()}`, { cache: "no-store" });
          if (!response.ok) {
            return "";
          }

          const payload = await response.json();
          return typeof payload?.build === "string" ? payload.build.trim() : "";
        } catch {
          return "";
        }
      }

      const buildVersion = await resolveBuildVersion();
      window.__DBR_BUILD_VERSION__ = buildVersion;

      if (buildVersion) {
        await import(`./src/main.js?v=${encodeURIComponent(buildVersion)}`);
      } else {
        await import("./src/main.js");
      }
    </script>
  </body>
</html>
